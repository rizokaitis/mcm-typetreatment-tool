/* ─── Design Tokens ─── */
:root {
  --maroon: #7A003C;
  --maroon-hover: #5c002d;
  --maroon-light: rgba(122, 0, 60, 0.08);
  --white: #FFFFFF;
  --black: #000000;
  --bg-app: #FFFFFF;
  --bg-card: #EEEFF1;
  --bg-input: #FFFFFF;
  --bg-hover: #F0F0F0;
  --border: #D4D4D8;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-tertiary: #999999;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.10);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  --radius: 10px;
  --radius-sm: 6px;
  --font-ui: 'Poppins', system-ui, -apple-system, sans-serif;
}

/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-ui);
  background: var(--bg-app);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 0;
}

/* ─── Loading Overlay ─── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
#loading-overlay .spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--maroon);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

/* ─── Layout ─── */
.app-container {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 60px;
}

/* ─── Header ─── */
.app-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.app-header img {
  height: 44px;
  width: auto;
}
.app-header .header-text h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}
.app-header .header-text p {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-top: 2px;
}

/* ─── Cards ─── */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.card + .card { margin-top: 20px; }

/* ─── Form Controls ─── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group.full-width { grid-column: 1 / -1; }

.form-group label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group textarea,
.form-group input[type="text"] {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  resize: vertical;
}
.form-group textarea:focus,
.form-group input[type="text"]:focus {
  border-color: var(--maroon);
  box-shadow: 0 0 0 3px var(--maroon-light);
}
.form-group textarea {
  min-height: 100px;
  line-height: 1.5;
}
.form-group textarea::placeholder,
.form-group input::placeholder {
  color: var(--text-tertiary);
  font-weight: 400;
}

/* ─── Point Size Control ─── */
.size-control {
  display: flex;
  align-items: center;
  gap: 12px;
}
.size-control input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.size-control input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--maroon);
  cursor: pointer;
  border: 2px solid var(--white);
  box-shadow: var(--shadow-sm);
}
.size-control input[type="number"] {
  font-family: var(--font-ui);
  width: 64px;
  padding: 6px 8px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
}
.size-control input[type="number"]:focus {
  border-color: var(--maroon);
  box-shadow: 0 0 0 3px var(--maroon-light);
}
.size-control .unit {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* ─── Unit Toggle (em/px) ─── */
.unit-toggle {
  display: flex;
  gap: 0;
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.unit-toggle button {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-input);
  color: var(--text-tertiary);
  line-height: 1;
}
.unit-toggle button.active {
  background: var(--maroon);
  color: var(--white);
}
.unit-toggle button:not(.active):hover {
  background: var(--bg-hover);
}

/* ─── Background Toggle ─── */
.bg-toggle {
  display: flex;
  gap: 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
  width: fit-content;
}
.bg-toggle button {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-input);
  color: var(--text-secondary);
}
.bg-toggle button.active {
  background: var(--maroon);
  color: var(--white);
}
.bg-toggle button:not(.active):hover {
  background: var(--bg-hover);
}

/* ─── Action Buttons ─── */
.actions-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.btn {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary {
  background: var(--maroon);
  color: var(--white);
}
.btn-primary:hover { background: var(--maroon-hover); }
.btn-secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ─── Export Dropdown ─── */
.export-wrapper {
  position: relative;
  margin-left: auto;
}
.export-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  min-width: 180px;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition: opacity 0.2s ease, visibility 0.2s ease, transform 0.2s ease;
}
.export-dropdown.open {
  opacity: 1;
  visibility: visible;
  transform: none;
}
.export-dropdown button {
  font-family: var(--font-ui);
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-primary);
  transition: background 0.15s ease;
}
.export-dropdown button:hover {
  background: var(--bg-card);
}
.export-dropdown button:first-child { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.export-dropdown button:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.export-dropdown .divider {
  height: 1px;
  background: var(--border);
  margin: 0;
}

/* ─── Preview Card ─── */
.preview-card {
  position: relative;
  width: fit-content;
  min-width: 100%;
}
.preview-card .preview-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}
.preview-wrapper {
  border-radius: var(--radius-sm);
  overflow: visible;
  border: 1px solid var(--border);
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  transition: background-color 0.3s ease;
  position: relative;
  width: fit-content;
  min-width: 100%;
}
.preview-wrapper.bg-white { background: var(--white); }
.preview-wrapper.bg-black { background: var(--black); }

#preview-container {
  position: relative;
  padding: 40px;
  width: max-content;
  min-width: calc(100% - 80px); /* 100% minus padding on both sides */
}
.preview-placeholder {
  color: var(--text-tertiary);
  font-size: 14px;
  font-weight: 400;
  text-align: center;
  padding: 60px 20px;
}

/* ─── Preview Text Rendering ─── */
.preview-line {
  display: block;
  white-space: nowrap;
  position: relative;
  z-index: 2;
  overflow: visible;
}
.preview-word {
  display: inline;
  position: relative;
  z-index: 2;
}
.highlight-box {
  position: absolute;
  background: var(--maroon);
  z-index: 1;
  pointer-events: none;
}

/* ─── Animation ─── */
.animate .preview-line {
  opacity: 0;
  transform: translateY(15px);
}
.animate .highlight-box {
  transform: scaleX(0);
  transform-origin: left center;
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes revealBox {
  to { transform: scaleX(1); }
}
@keyframes textToWhite {
  to { color: #FFFFFF; }
}

/* ─── Responsive ─── */
@media (max-width: 640px) {
  .app-container { padding: 20px 16px 40px; }
  .card { padding: 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .actions-row { flex-wrap: wrap; }
  .export-wrapper { margin-left: 0; width: 100%; }
  .export-wrapper .btn { width: 100%; justify-content: center; }
  .export-dropdown { left: 0; right: 0; }
}
</style>
</head>
<body>

<!-- Loading overlay while font loads -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading Poppins typeface...</p>
</div>

<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <img src="Assets/mcm.svg" alt="McMaster University">
    <div class="header-text">
      <h1>Type Treatment Tool</h1>
      <p>Highlight box generator for headline typography</p>
    </div>
  </header>

  <!-- Controls Card -->
  <div class="card">
    <div class="form-grid">

      <div class="form-group full-width">
        <label for="title-input">Title Text</label>
        <textarea id="title-input" placeholder="Enter your headline text here...&#10;Use line breaks to control layout" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label for="highlight-input">Highlight Words</label>
        <input type="text" id="highlight-input" placeholder="e.g. Brighter World">
      </div>

      <div class="form-group">
        <label>Point Size</label>
        <div class="size-control">
          <input type="range" id="size-slider" min="24" max="200" value="72">
          <input type="number" id="size-number" min="24" max="200" value="72">
          <span class="unit">px</span>
        </div>
        <label style="margin-top:12px;">Line Height</label>
        <div class="size-control">
          <input type="range" id="lh-slider" min="0.8" max="3.0" value="1.15" step="0.01">
          <input type="number" id="lh-number" min="0.8" max="3.0" value="1.15" step="0.01">
          <div class="unit-toggle" id="lh-unit-toggle">
            <button class="active" data-unit="em">em</button>
            <button data-unit="px">px</button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Background</label>
        <div class="bg-toggle">
          <button id="bg-white" class="active" data-bg="white">White</button>
          <button id="bg-black" data-bg="black">Black</button>
        </div>
      </div>

    </div>

    <div class="actions-row">
      <button class="btn btn-primary" id="btn-generate">Generate</button>
      <button class="btn btn-secondary" id="btn-reset">Reset</button>
      <div class="export-wrapper">
        <button class="btn btn-secondary" id="btn-export">
          Export
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left:2px">
            <path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="export-dropdown" id="export-dropdown">
          <button data-format="png">PNG (Transparent)</button>
          <button data-format="svg">SVG</button>
          <button data-format="pdf">PDF</button>
          <button data-format="eps">EPS (Print/CMYK)</button>
          <div class="divider"></div>
          <button data-format="code">Code (Animation)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Preview Card -->
  <div class="card preview-card">
    <div class="preview-label">Preview</div>
    <div class="preview-wrapper bg-white" id="preview-wrapper">
      <div id="preview-container">
        <div class="preview-placeholder" id="preview-placeholder">
          Enter a title and highlight words, then click Generate
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  // ─── State ───
  let capHeightRatio = null;
  let currentBg = 'white';
  let lhUnit = 'em';
  let fontDataBase64 = null;
  let isGenerated = false;

  // ─── DOM References ───
  const titleInput = document.getElementById('title-input');
  const highlightInput = document.getElementById('highlight-input');
  const sizeSlider = document.getElementById('size-slider');
  const sizeNumber = document.getElementById('size-number');
  const lhSlider = document.getElementById('lh-slider');
  const lhNumber = document.getElementById('lh-number');
  const bgWhiteBtn = document.getElementById('bg-white');
  const bgBlackBtn = document.getElementById('bg-black');
  const btnGenerate = document.getElementById('btn-generate');
  const btnReset = document.getElementById('btn-reset');
  const btnExport = document.getElementById('btn-export');
  const exportDropdown = document.getElementById('export-dropdown');
  const lhUnitToggle = document.getElementById('lh-unit-toggle');
  const lhUnitBtns = lhUnitToggle.querySelectorAll('button');
  const previewWrapper = document.getElementById('preview-wrapper');
  const previewContainer = document.getElementById('preview-container');
  const previewPlaceholder = document.getElementById('preview-placeholder');
  const loadingOverlay = document.getElementById('loading-overlay');

  // ─── Cap Height Measurement ───
  // Measures the actual rendered cap height of "H" in Poppins Bold
  function measureCapHeight(fontSizePx) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '700 ' + fontSizePx + 'px Poppins';
    ctx.textBaseline = 'alphabetic';

    const metrics = ctx.measureText('H');

    // Tier 1: Modern TextMetrics API
    if (typeof metrics.actualBoundingBoxAscent === 'number') {
      return metrics.actualBoundingBoxAscent;
    }

    // Tier 2: Pixel scan fallback
    return measureCapHeightPixelScan(fontSizePx);
  }

  function measureCapHeightPixelScan(fontSizePx) {
    const canvas = document.createElement('canvas');
    const size = Math.ceil(fontSizePx * 3);
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, size, size);

    ctx.fillStyle = '#000000';
    ctx.font = '700 ' + fontSizePx + 'px Poppins';
    ctx.textBaseline = 'alphabetic';
    const baseline = Math.ceil(fontSizePx * 2);
    ctx.fillText('H', 10, baseline);

    const imageData = ctx.getImageData(0, 0, size, size);
    const data = imageData.data;

    let topPixel = size;
    let bottomPixel = 0;

    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const idx = (y * size + x) * 4;
        if (data[idx] < 128) {
          topPixel = Math.min(topPixel, y);
          bottomPixel = Math.max(bottomPixel, y);
        }
      }
    }

    return bottomPixel - topPixel;
  }

  function getCapHeightRatio() {
    if (capHeightRatio !== null) return capHeightRatio;
    const refSize = 200;
    const capHeight = measureCapHeight(refSize);
    capHeightRatio = capHeight / refSize;
    return capHeightRatio;
  }

  function capHeightAtSize(fontSizePx) {
    return fontSizePx * getCapHeightRatio();
  }

  function computeLineHeight(fontSize) {
    const lhValue = parseFloat(lhNumber.value) || (lhUnit === 'em' ? 1.15 : Math.ceil(fontSize * 1.15));
    return lhUnit === 'em' ? Math.ceil(fontSize * lhValue) : Math.ceil(lhValue);
  }

  // ─── Highlight Matching ───
  function getHighlightedWordIndices(titleWords, highlightText) {
    const indices = new Set();
    if (!highlightText.trim()) return indices;

    const highlightTokens = highlightText.trim().toLowerCase().split(/\s+/);
    const titleLower = titleWords.map(function(w) {
      return w.toLowerCase().replace(/[^a-z0-9]/g, '');
    });

    for (let i = 0; i <= titleLower.length - highlightTokens.length; i++) {
      let match = true;
      for (let j = 0; j < highlightTokens.length; j++) {
        const ht = highlightTokens[j].replace(/[^a-z0-9]/g, '');
        if (titleLower[i + j] !== ht) {
          match = false;
          break;
        }
      }
      if (match) {
        for (let j = 0; j < highlightTokens.length; j++) {
          indices.add(i + j);
        }
      }
    }

    return indices;
  }

  // ─── Baseline Probe ───
  // Measures the EXACT baseline position within a rendered line element.
  // Injects a zero-width inline-block element aligned to the baseline,
  // then measures where the browser actually placed it.
  function probeBaseline(lineElement) {
    const probe = document.createElement('span');
    probe.style.cssText = 'display:inline-block;width:0;height:0;vertical-align:baseline;overflow:hidden;';
    lineElement.appendChild(probe);
    const lineRect = lineElement.getBoundingClientRect();
    const probeRect = probe.getBoundingClientRect();
    const baselineFromLineTop = probeRect.top - lineRect.top;
    lineElement.removeChild(probe);
    return baselineFromLineTop;
  }

  // ─── Rendering ───
  function render(animate) {
    const title = titleInput.value;
    const highlightText = highlightInput.value;
    const fontSize = parseInt(sizeNumber.value) || 72;

    if (!title.trim()) {
      previewContainer.innerHTML = '';
      previewPlaceholder.style.display = '';
      previewContainer.appendChild(previewPlaceholder);
      isGenerated = false;
      return;
    }

    previewPlaceholder.style.display = 'none';
    isGenerated = true;

    // Parse lines and words
    const lines = title.split('\n');
    const allWords = [];
    const lineData = [];

    lines.forEach(function(line, lineIdx) {
      const words = line.split(/\s+/).filter(function(w) { return w.length > 0; });
      lineData.push(words);
      words.forEach(function(w) {
        allWords.push({ text: w, lineIdx: lineIdx });
      });
    });

    // Determine highlighted words
    const justWords = allWords.map(function(w) { return w.text; });
    const highlightedIndices = getHighlightedWordIndices(justWords, highlightText);

    // Cap height and padding — all derived from PHYSICAL cap height
    const capHeight = capHeightAtSize(fontSize);
    const padTop = capHeight * 0.20;
    const padSide = capHeight * 0.20;
    const padBottom = capHeight * 0.35;

    // Line-height from the user's slider (em or px)
    const lineHeight = computeLineHeight(fontSize);

    // Build DOM — no animation classes yet, we measure first
    const textColor = currentBg === 'white' ? '#000000' : '#FFFFFF';

    let html = '';
    let wordIndex = 0;

    lineData.forEach(function(words, lineIdx) {
      html += '<div class="preview-line" data-line="' + lineIdx + '" style="';
      html += 'font-family: Poppins, sans-serif;';
      html += 'font-weight: 700;';
      html += 'font-size: ' + fontSize + 'px;';
      html += 'line-height: ' + lineHeight + 'px;';
      html += '">';

      words.forEach(function(word, wIdx) {
        const isHighlighted = highlightedIndices.has(wordIndex);
        // On white bg with animation, start highlighted words as black (visible)
        // so they can be seen during fade-up before the maroon box reveals
        const color = (isHighlighted && !(animate && currentBg === 'white')) ? '#FFFFFF' : textColor;
        html += '<span class="preview-word" data-word-index="' + wordIndex + '" data-highlighted="' + isHighlighted + '" style="color: ' + color + ';">';
        html += escapeHTML(word);
        html += '</span>';
        if (wIdx < words.length - 1) {
          html += '<span class="preview-word" style="color: ' + textColor + ';"> </span>';
        }
        wordIndex++;
      });

      html += '</div>';
    });

    // Remove animation class before rebuilding DOM so new elements
    // aren't affected by .animate .preview-line { opacity:0; transform:translateY(15px) }
    // which would shift lines and corrupt measurements
    previewContainer.classList.remove('animate');

    previewContainer.innerHTML = html;

    // Force synchronous layout so all measurements are stable
    void previewContainer.offsetHeight;

    // Now measure and place the highlight box
    placeHighlightBox(highlightedIndices, capHeight, padTop, padSide, padBottom, animate);
  }

  function placeHighlightBox(highlightedIndices, capHeight, padTop, padSide, padBottom, animate) {
    // Remove any existing highlight boxes and text overlays
    previewContainer.querySelectorAll('.highlight-box').forEach(function(el) { el.remove(); });
    previewContainer.querySelectorAll('.text-reveal-overlay').forEach(function(el) { el.remove(); });

    if (highlightedIndices.size === 0) {
      if (animate) applyLineAnimation();
      return;
    }

    const containerRect = previewContainer.getBoundingClientRect();
    const wordSpans = previewContainer.querySelectorAll('.preview-word[data-highlighted="true"]');

    if (wordSpans.length === 0) {
      if (animate) applyLineAnimation();
      return;
    }

    // ── Step 1: Measure ink bounds and group by line ──
    const fontSize = parseInt(sizeNumber.value) || 72;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '700 ' + fontSize + 'px Poppins';
    ctx.textBaseline = 'alphabetic';

    const lineGroups = {}; // lineIdx → { lineEl, minLeft, maxRight }

    wordSpans.forEach(function(span) {
      const line = span.closest('.preview-line');
      const lineIdx = line.getAttribute('data-line');
      const rect = span.getBoundingClientRect();
      const word = span.textContent;
      const metrics = ctx.measureText(word);
      const origin = rect.left - containerRect.left;

      let inkLeft, inkRight;
      if (typeof metrics.actualBoundingBoxLeft === 'number') {
        inkLeft = origin - metrics.actualBoundingBoxLeft;
        inkRight = origin + metrics.actualBoundingBoxRight;
      } else {
        inkLeft = origin;
        inkRight = rect.right - containerRect.left;
      }

      if (!lineGroups[lineIdx]) {
        lineGroups[lineIdx] = { lineEl: line, minLeft: Infinity, maxRight: -Infinity };
      }
      lineGroups[lineIdx].minLeft = Math.min(lineGroups[lineIdx].minLeft, inkLeft);
      lineGroups[lineIdx].maxRight = Math.max(lineGroups[lineIdx].maxRight, inkRight);
    });

    // ── Step 2: Create one highlight box per line ──
    // Each line's box spans from that line's leftmost highlighted ink to rightmost highlighted ink

    Object.keys(lineGroups).sort(function(a, b) { return parseInt(a) - parseInt(b); }).forEach(function(lineIdx, boxIdx) {
      const group = lineGroups[lineIdx];
      const lineEl = group.lineEl;

      // Probe baseline for this line
      const lineRect = lineEl.getBoundingClientRect();
      const baseline = probeBaseline(lineEl);
      const lineTop = lineRect.top - containerRect.top;
      const capTop = lineTop + baseline - capHeight;
      const boxTop = capTop - padTop;
      const boxBottom = lineTop + baseline + padBottom;

      const boxLeft = group.minLeft - padSide;
      const boxRight = group.maxRight + padSide;
      const boxWidth = boxRight - boxLeft;
      const boxHeight = boxBottom - boxTop;

      const box = document.createElement('div');
      box.className = 'highlight-box';
      box.style.left = boxLeft + 'px';
      box.style.top = boxTop + 'px';
      box.style.width = boxWidth + 'px';
      box.style.height = boxHeight + 'px';

      previewContainer.insertBefore(box, previewContainer.firstChild);

      // On white bg with animation: create a white text overlay that reveals
      // left-to-right via clip-path, synced with the maroon box sweep
      if (animate && currentBg === 'white') {
        const allLines = previewContainer.querySelectorAll('.preview-line');
        const overlayDelayMs = ((allLines.length * 0.15) + 0.3 + boxIdx * 0.08) * 1000;

        const overlay = document.createElement('div');
        overlay.className = 'text-reveal-overlay';
        overlay.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;z-index:3;pointer-events:none;';

        // Clone the line — highlighted words white, everything else transparent
        const lineClone = lineEl.cloneNode(true);
        lineClone.className = '';
        lineClone.style.cssText = 'position:absolute;white-space:nowrap;opacity:1;transform:none;animation:none;';
        lineClone.style.left = (lineRect.left - containerRect.left) + 'px';
        lineClone.style.top = lineTop + 'px';
        lineClone.style.fontFamily = 'Poppins, sans-serif';
        lineClone.style.fontWeight = '700';
        lineClone.style.fontSize = fontSize + 'px';
        lineClone.style.lineHeight = computeLineHeight(fontSize) + 'px';
        lineClone.querySelectorAll('span').forEach(function(w) {
          w.style.color = w.getAttribute('data-highlighted') === 'true' ? '#FFFFFF' : 'transparent';
        });

        overlay.appendChild(lineClone);
        previewContainer.appendChild(overlay);

        // Animate clip-path: reveal from left to right across the box area
        // Extend bottom by a few pixels to ensure descenders are fully covered
        const cw = previewContainer.offsetWidth;
        const ch = previewContainer.offsetHeight;
        const extendedBottom = boxBottom + 5; // Extra pixels to cover descenders
        const clipFrom = 'inset(' + boxTop + 'px ' + Math.max(0, cw - boxLeft) + 'px ' + Math.max(0, ch - extendedBottom) + 'px ' + boxLeft + 'px)';
        const clipTo = 'inset(' + boxTop + 'px ' + Math.max(0, cw - boxRight) + 'px ' + Math.max(0, ch - extendedBottom) + 'px ' + boxLeft + 'px)';

        const anim = overlay.animate(
          [{ clipPath: clipFrom }, { clipPath: clipTo }],
          { duration: 500, easing: 'ease-out', delay: overlayDelayMs, fill: 'both' }
        );

        // After reveal completes, set original text to white and remove overlay
        anim.finished.then(function() {
          lineEl.querySelectorAll('.preview-word[data-highlighted="true"]').forEach(function(w) {
            w.style.color = '#FFFFFF';
          });
          overlay.remove();
        });
      }
    });

    if (animate) {
      applyAnimation();
    }
  }

  // ─── Animation ───
  function applyAnimation() {
    previewContainer.classList.remove('animate');
    void previewContainer.offsetHeight; // force reflow
    previewContainer.classList.add('animate');

    const lines = previewContainer.querySelectorAll('.preview-line');
    const boxes = previewContainer.querySelectorAll('.highlight-box');

    lines.forEach(function(line, i) {
      line.style.animation = 'fadeUp 0.4s ease-out ' + (i * 0.15) + 's forwards';
    });

    if (boxes.length > 0) {
      const baseDelay = (lines.length * 0.15) + 0.3;
      boxes.forEach(function(box, i) {
        box.style.animation = 'revealBox 0.5s ease-out ' + (baseDelay + i * 0.08) + 's forwards';
      });

    }
  }

  function applyLineAnimation() {
    previewContainer.classList.remove('animate');
    void previewContainer.offsetHeight;
    previewContainer.classList.add('animate');

    const lines = previewContainer.querySelectorAll('.preview-line');
    lines.forEach(function(line, i) {
      line.style.animation = 'fadeUp 0.4s ease-out ' + (i * 0.15) + 's forwards';
    });
  }

  // ─── Export Functions ───

  // PNG Export
  async function exportPNG() {
    if (!isGenerated) return;
    if (typeof htmlToImage === 'undefined') { alert('Export library failed to load. Check your internet connection.'); return; }

    // Temporarily remove animation classes
    previewContainer.classList.remove('animate');
    const lines = previewContainer.querySelectorAll('.preview-line');
    const boxes = previewContainer.querySelectorAll('.highlight-box');
    lines.forEach(function(l) { l.style.animation = ''; l.style.opacity = '1'; l.style.transform = ''; });
    boxes.forEach(function(b) { b.style.animation = ''; b.style.transform = ''; });

    try {
      const dataUrl = await htmlToImage.toPng(previewContainer, {
        backgroundColor: null,
        pixelRatio: 2
      });

      const link = document.createElement('a');
      link.download = 'mcmaster-type-treatment.png';
      link.href = dataUrl;
      link.click();
    } catch (err) {
      console.error('PNG export failed:', err);
      alert('PNG export failed. Please try again.');
    }

    // Restore preview state after export (re-render without animation)
    render(false);
  }

  // ─── Shared Export Layout Engine ───
  // Computes word positions and highlight box geometry using canvas measurements.
  // Used by SVG, PDF, and Code exports. Uses the same capHeight-based math
  // as the DOM preview renderer.
  function computeExportLayout() {
    const fontSize = parseInt(sizeNumber.value) || 72;
    const capHeight = capHeightAtSize(fontSize);
    const padTop = capHeight * 0.20;
    const padSide = capHeight * 0.20;
    const padBottom = capHeight * 0.35;
    const lineHeight = computeLineHeight(fontSize);
    const textColor = currentBg === 'white' ? '#000000' : '#FFFFFF';

    const title = titleInput.value;
    const highlightText = highlightInput.value;
    const lines = title.split('\n');
    const allWords = [];
    const lineData = [];

    lines.forEach(function(line) {
      const words = line.split(/\s+/).filter(function(w) { return w.length > 0; });
      lineData.push(words);
      words.forEach(function(w) { allWords.push(w); });
    });

    const highlightedIndices = getHighlightedWordIndices(allWords, highlightText);

    // Measure with canvas
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '700 ' + fontSize + 'px Poppins';
    ctx.textBaseline = 'alphabetic';
    const spaceWidth = ctx.measureText(' ').width;

    // In SVG, <text> y= is the baseline position.
    // We place baseline at: yOffset + ascent (where ascent = capHeight for cap-aligned text)
    // But we need the TRUE font ascent for proper vertical placement.
    const metrics = ctx.measureText('H');
    let fontAscent = capHeight; // fallback
    if (typeof metrics.fontBoundingBoxAscent === 'number') {
      fontAscent = metrics.fontBoundingBoxAscent;
    }

    // For SVG, we use a simple layout:
    // Each line's baseline = topPadding + lineIndex * lineHeight + fontAscent
    // The capTop = baseline - capHeight
    const padding = 40;

    // Calculate effective top padding to ensure highlight boxes don't get cropped
    // Box extends (capHeight + padTop) above baseline, but text only extends fontAscent above baseline
    // If box extends beyond fontAscent, we need extra padding
    const boxOverhang = Math.max(0, capHeight + padTop - fontAscent);
    const topPadding = padding + boxOverhang;

    let wordIdx = 0;
    let maxWidth = 0;
    const wordPositions = [];

    lineData.forEach(function(words, lineIdx) {
      const baseline = topPadding + (lineIdx * lineHeight) + fontAscent;
      let xOffset = 0;
      words.forEach(function(word, wIdx) {
        const wMetrics = ctx.measureText(word);
        const w = wMetrics.width;
        // Compute ink bounds: origin is at xOffset + padding
        // Ink left = origin - actualBoundingBoxLeft
        // Ink right = origin + actualBoundingBoxRight
        const origin = xOffset + padding;
        const inkLeft = (typeof wMetrics.actualBoundingBoxLeft === 'number')
          ? origin - wMetrics.actualBoundingBoxLeft
          : origin;
        const inkRight = (typeof wMetrics.actualBoundingBoxRight === 'number')
          ? origin + wMetrics.actualBoundingBoxRight
          : origin + w;
        wordPositions.push({
          text: word,
          x: origin,
          baseline: baseline,
          width: w,
          inkLeft: inkLeft,
          inkRight: inkRight,
          lineIdx: lineIdx,
          highlighted: highlightedIndices.has(wordIdx)
        });
        xOffset += w;
        if (wIdx < words.length - 1) xOffset += spaceWidth;
        wordIdx++;
      });
      maxWidth = Math.max(maxWidth, xOffset);
    });

    const totalWidth = maxWidth + padding * 2;

    // Calculate proper total height accounting for font metrics AND highlight boxes
    const fontDescent = metrics.fontBoundingBoxDescent || (fontSize * 0.3); // fallback to ~30% of font size

    // Calculate total height based on actual content bounds
    const lastLineBaseline = topPadding + ((lineData.length - 1) * lineHeight) + fontAscent;
    const bottomExtent = Math.max(
      lastLineBaseline + fontDescent, // Text descent
      lastLineBaseline + padBottom    // Highlight box bottom
    );

    const totalHeight = bottomExtent + padding;

    // Compute per-line highlight boxes using INK bounds
    // Left edge is shared (left-aligned), right edge is per-line
    var highlightBoxes = [];
    const highlightedWords = wordPositions.filter(function(w) { return w.highlighted; });
    if (highlightedWords.length > 0) {
      var perLine = {};

      highlightedWords.forEach(function(w) {
        if (!perLine[w.lineIdx]) {
          perLine[w.lineIdx] = { minLeft: Infinity, maxRight: -Infinity };
        }
        perLine[w.lineIdx].minLeft = Math.min(perLine[w.lineIdx].minLeft, w.inkLeft);
        perLine[w.lineIdx].maxRight = Math.max(perLine[w.lineIdx].maxRight, w.inkRight);
      });

      Object.keys(perLine).sort(function(a, b) { return parseInt(a) - parseInt(b); }).forEach(function(li) {
        var lineIdx = parseInt(li);
        var baseline = topPadding + (lineIdx * lineHeight) + fontAscent;
        var capTopLine = baseline - capHeight;
        var boxTop = capTopLine - padTop;
        var boxBottom = baseline + padBottom;
        var boxLeft = perLine[li].minLeft - padSide;
        var boxRight = perLine[li].maxRight + padSide;

        highlightBoxes.push({
          x: boxLeft,
          y: boxTop,
          width: boxRight - boxLeft,
          height: boxBottom - boxTop
        });
      });
    }

    return {
      fontSize: fontSize,
      lineHeight: lineHeight,
      textColor: textColor,
      wordPositions: wordPositions,
      highlightBoxes: highlightBoxes,
      totalWidth: totalWidth,
      totalHeight: totalHeight,
      lineData: lineData,
      highlightedIndices: highlightedIndices
    };
  }

  // SVG Export
  async function exportSVG() {
    if (!isGenerated) return;
    const svgString = await buildSVGString();
    downloadBlob(svgString, 'mcmaster-type-treatment.svg', 'image/svg+xml');
  }

  // PDF Export
  async function exportPDF() {
    if (!isGenerated) return;
    if (typeof window.jspdf === 'undefined') { alert('Export library failed to load. Check your internet connection.'); return; }

    try {
      const svgString = await buildSVGString();
      const parser = new DOMParser();
      const svgDoc = parser.parseFromString(svgString, 'image/svg+xml');
      const svgElement = svgDoc.documentElement;

      const vb = svgElement.getAttribute('viewBox').split(' ').map(Number);
      const svgWidth = vb[2];
      const svgHeight = vb[3];

      const widthMm = svgWidth * 0.2645833;
      const heightMm = svgHeight * 0.2645833;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: widthMm > heightMm ? 'landscape' : 'portrait',
        unit: 'mm',
        format: [widthMm, heightMm]
      });

      await pdf.svg(svgElement, {
        x: 0, y: 0,
        width: widthMm,
        height: heightMm
      });

      pdf.save('mcmaster-type-treatment.pdf');
    } catch (err) {
      console.error('PDF export failed:', err);
      alert('PDF export failed. Please try again.');
    }
  }

  // EPS Export (Print/CMYK) — with Poppins Bold outlined as paths
  async function exportEPS() {
    if (!isGenerated) return;
    if (typeof opentype === 'undefined') {
      alert('Font library failed to load. Check your internet connection.');
      return;
    }

    try {
      // Load Poppins Bold font (use .woff format - opentype.js doesn't support .woff2)
      const fontUrl = 'https://cdn.jsdelivr.net/npm/@fontsource/poppins@5.0.8/files/poppins-latin-700-normal.woff';
      const font = await opentype.load(fontUrl);

      const layout = computeExportLayout();
      const width = layout.totalWidth;
      const height = layout.totalHeight;

      // Build EPS (Encapsulated PostScript) with CMYK colors
      let eps = '%!PS-Adobe-3.0 EPSF-3.0\n';
      eps += '%%BoundingBox: 0 0 ' + Math.ceil(width) + ' ' + Math.ceil(height) + '\n';
      eps += '%%Creator: McMaster Type Treatment Tool\n';
      eps += '%%Title: McMaster Type Treatment\n';
      eps += '%%DocumentData: Clean7Bit\n';
      eps += '%%EndComments\n\n';

      // Define CMYK color procedures
      eps += '% CMYK Color Definitions\n';
      eps += '/maroon { 0 1.0 0.15 0.6 setcmykcolor } def  % C0 M100 Y15 K60 (#7A003C)\n';
      eps += '/white { 0 0 0 0 setcmykcolor } def\n';
      eps += '/black { 0 0 0 1.0 setcmykcolor } def\n\n';

      // Draw highlight boxes
      eps += '% Highlight Boxes\n';
      eps += 'maroon\n';
      layout.highlightBoxes.forEach(function(box) {
        // PostScript Y-axis is bottom-up, so flip Y coordinate
        const y = height - box.y - box.height;
        eps += box.x + ' ' + y + ' ' + box.width + ' ' + box.height + ' rectfill\n';
      });

      // Convert text to outlined paths using opentype.js
      eps += '\n% Text (outlined paths)\n';
      layout.wordPositions.forEach(function(w) {
        // Set color based on highlight state and background
        if (w.highlighted) {
          eps += 'white\n';
        } else {
          eps += (currentBg === 'white' ? 'black' : 'white') + '\n';
        }

        // Get the glyph path for this text at the specified font size
        const path = font.getPath(w.text, 0, 0, layout.fontSize);

        // Convert opentype.js path to PostScript path commands
        // PostScript Y-axis is bottom-up, so flip Y coordinates
        eps += 'newpath\n';
        eps += 'gsave\n';
        eps += w.x + ' ' + (height - w.baseline) + ' translate\n';
        eps += '1 -1 scale\n'; // Flip Y-axis for PostScript

        // Track current point for quadratic bezier conversion
        let currentX = 0;
        let currentY = 0;

        path.commands.forEach(function(cmd) {
          switch(cmd.type) {
            case 'M': // moveto
              eps += cmd.x + ' ' + cmd.y + ' moveto\n';
              currentX = cmd.x;
              currentY = cmd.y;
              break;
            case 'L': // lineto
              eps += cmd.x + ' ' + cmd.y + ' lineto\n';
              currentX = cmd.x;
              currentY = cmd.y;
              break;
            case 'C': // cubic bezier
              eps += cmd.x1 + ' ' + cmd.y1 + ' ' + cmd.x2 + ' ' + cmd.y2 + ' ' + cmd.x + ' ' + cmd.y + ' curveto\n';
              currentX = cmd.x;
              currentY = cmd.y;
              break;
            case 'Q': // quadratic bezier - convert to cubic
              // Quadratic: P0 (current), P1 (control), P2 (end)
              // Cubic control points: CP1 = P0 + 2/3*(P1-P0), CP2 = P2 + 2/3*(P1-P2)
              const cp1x = currentX + (2/3) * (cmd.x1 - currentX);
              const cp1y = currentY + (2/3) * (cmd.y1 - currentY);
              const cp2x = cmd.x + (2/3) * (cmd.x1 - cmd.x);
              const cp2y = cmd.y + (2/3) * (cmd.y1 - cmd.y);
              eps += cp1x + ' ' + cp1y + ' ' + cp2x + ' ' + cp2y + ' ' + cmd.x + ' ' + cmd.y + ' curveto\n';
              currentX = cmd.x;
              currentY = cmd.y;
              break;
            case 'Z': // closepath
              eps += 'closepath\n';
              break;
          }
        });

        eps += 'fill\n';
        eps += 'grestore\n\n';
      });

      eps += 'showpage\n';
      eps += '%%EOF\n';

      // Download
      downloadBlob(eps, 'mcmaster-type-treatment.eps', 'application/postscript');
    } catch (err) {
      console.error('EPS export failed:', err);
      alert('EPS export failed: ' + err.message);
    }
  }

  // Helper to build SVG string (reused by PDF and SVG exports)
  async function buildSVGString() {
    const layout = computeExportLayout();

    let svg = '<?xml version="1.0" encoding="utf-8"?>\n';
    svg += '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + layout.totalWidth + ' ' + layout.totalHeight + '" width="' + layout.totalWidth + '" height="' + layout.totalHeight + '">\n';

    const fontCSS = await getEmbeddedFontCSS();
    if (fontCSS) {
      svg += '<defs><style>\n' + fontCSS + '\n</style></defs>\n';
    }

    layout.highlightBoxes.forEach(function(hb) {
      svg += '<rect x="' + hb.x + '" y="' + hb.y + '" width="' + hb.width + '" height="' + hb.height + '" fill="#7A003C"/>\n';
    });

    layout.wordPositions.forEach(function(w) {
      const fill = w.highlighted ? '#FFFFFF' : layout.textColor;
      svg += '<text x="' + w.x + '" y="' + w.baseline + '" font-family="Poppins, sans-serif" font-weight="700" font-size="' + layout.fontSize + '" fill="' + fill + '">' + escapeHTML(w.text) + '</text>\n';
    });

    svg += '</svg>';
    return svg;
  }

  // Code Export
  function exportCode() {
    if (!isGenerated) return;

    const layout = computeExportLayout();
    const bgColor = currentBg === 'white' ? '#FFFFFF' : '#000000';

    // Build the HTML lines
    let textHTML = '';
    let wordIdx = 0;
    layout.lineData.forEach(function(words, lineIdx) {
      textHTML += '    <div class="line line-' + lineIdx + '">';
      words.forEach(function(word, wIdx) {
        const isHl = layout.highlightedIndices.has(wordIdx);
        const cls = isHl ? 'word highlighted' : 'word normal';
        textHTML += '<span class="' + cls + '">' + escapeHTML(word) + '</span>';
        if (wIdx < words.length - 1) textHTML += '<span class="word normal"> </span>';
        wordIdx++;
      });
      textHTML += '</div>\n';
    });

    // Line animation delays
    let lineCSS = '';
    layout.lineData.forEach(function(_, i) {
      lineCSS += '    .line-' + i + ' { animation-delay: ' + (i * 0.15) + 's; }\n';
    });
    const boxDelay = (layout.lineData.length * 0.15) + 0.3;

    // Get highlight box geometry from the layout engine (not DOM)
    let boxCSS = '';
    let boxHTML = '';
    if (layout.highlightBoxes.length > 0) {
      boxCSS += '    .highlight-box {\n';
      boxCSS += '      position: absolute;\n';
      boxCSS += '      background: #7A003C;\n';
      boxCSS += '      z-index: 1;\n';
      boxCSS += '      transform-origin: left center;\n';
      boxCSS += '      transform: scaleX(0);\n';
      boxCSS += '      animation: revealBox 0.5s ease-out forwards;\n';
      boxCSS += '    }\n';
      layout.highlightBoxes.forEach(function(box, i) {
        const delay = boxDelay + (i * 0.08);
        boxCSS += '    .highlight-box-' + i + ' {\n';
        boxCSS += '      left: ' + box.x + 'px;\n';
        boxCSS += '      top: ' + box.y + 'px;\n';
        boxCSS += '      width: ' + box.width + 'px;\n';
        boxCSS += '      height: ' + box.height + 'px;\n';
        boxCSS += '      animation-delay: ' + delay + 's;\n';
        boxCSS += '    }\n';
        boxHTML += '  <div class="highlight-box highlight-box-' + i + '"></div>\n';
      });
    }

    const code = '<!DOCTYPE html>\n' +
'<html lang="en">\n' +
'<head>\n' +
'<meta charset="UTF-8">\n' +
'<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
'<title>McMaster Type Treatment</title>\n' +
'<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">\n' +
'<style>\n' +
'  * { margin: 0; padding: 0; box-sizing: border-box; }\n' +
'  body {\n' +
'    display: flex;\n' +
'    align-items: center;\n' +
'    justify-content: center;\n' +
'    min-height: 100vh;\n' +
'    background: ' + bgColor + ';\n' +
'    font-family: "Poppins", sans-serif;\n' +
'    font-weight: 700;\n' +
'  }\n' +
'  .container {\n' +
'    position: relative;\n' +
'    padding: 40px;\n' +
'    font-size: ' + layout.fontSize + 'px;\n' +
'    line-height: ' + layout.lineHeight + 'px;\n' +
'  }\n' +
boxCSS +
'  .line {\n' +
'    display: block;\n' +
'    white-space: nowrap;\n' +
'    position: relative;\n' +
'    z-index: 2;\n' +
'    opacity: 0;\n' +
'    transform: translateY(15px);\n' +
'    animation: fadeUp 0.4s ease-out forwards;\n' +
'  }\n' +
lineCSS +
'  .word { position: relative; z-index: 2; }\n' +
(currentBg === 'white' && layout.highlightBoxes.length > 0
  ? '  .word.highlighted { color: ' + layout.textColor + '; animation: textToWhite 0.15s ease-out ' + boxDelay + 's forwards; }\n'
  : '  .word.highlighted { color: #FFFFFF; }\n') +
'  .word.normal { color: ' + layout.textColor + '; }\n' +
'  @keyframes fadeUp {\n' +
'    to { opacity: 1; transform: translateY(0); }\n' +
'  }\n' +
'  @keyframes revealBox {\n' +
'    to { transform: scaleX(1); }\n' +
'  }\n' +
(currentBg === 'white' && layout.highlightBoxes.length > 0
  ? '  @keyframes textToWhite {\n    to { color: #FFFFFF; }\n  }\n'
  : '') +
'</style>\n' +
'</head>\n' +
'<body>\n' +
'<div class="container">\n' +
boxHTML +
textHTML +
'</div>\n' +
'</body>\n' +
'</html>';

    downloadBlob(code, 'mcmaster-type-treatment.html', 'text/html');
  }

  // ─── Font Embedding ───
  async function getEmbeddedFontCSS() {
    if (fontDataBase64) return fontDataBase64;

    try {
      // Fetch the Poppins Bold WOFF2 from Google Fonts
      const cssResponse = await fetch('https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap');
      const cssText = await cssResponse.text();

      // Extract ALL woff2 URLs from the CSS (multiple unicode ranges)
      const urlMatches = [...cssText.matchAll(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.woff2)\)/g)];
      if (urlMatches.length === 0) return null;

      let fontFaces = [];
      for (let i = 0; i < urlMatches.length; i++) {
        const fontUrl = urlMatches[i][1];
        const fontResponse = await fetch(fontUrl);
        const fontBlob = await fontResponse.blob();
        const base64 = await blobToBase64(fontBlob);

        fontFaces.push('@font-face {\n' +
          '  font-family: "Poppins";\n' +
          '  font-weight: 700;\n' +
          '  src: url(' + base64 + ') format("woff2");\n' +
          '}');
      }

      fontDataBase64 = fontFaces.join('\n');

      return fontDataBase64;
    } catch (err) {
      console.warn('Could not embed font:', err);
      return null;
    }
  }

  function blobToBase64(blob) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.onloadend = function() { resolve(reader.result); };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  // ─── Utilities ───
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function downloadBlob(content, filename, mimeType) {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = filename;
    link.href = url;
    link.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1500);
  }

  // ─── Event Handlers ───

  // Size slider ↔ number sync
  sizeSlider.addEventListener('input', function() {
    sizeNumber.value = sizeSlider.value;
    if (isGenerated) render(false);
  });
  sizeNumber.addEventListener('input', function() {
    let val = parseInt(sizeNumber.value);
    if (isNaN(val)) return;
    val = Math.min(200, Math.max(24, val));
    sizeSlider.value = val;
    if (isGenerated) render(false);
  });

  // Line-height slider ↔ number sync
  lhSlider.addEventListener('input', function() {
    lhNumber.value = lhSlider.value;
    if (isGenerated) render(false);
  });
  lhNumber.addEventListener('input', function() {
    let val = parseFloat(lhNumber.value);
    if (isNaN(val)) return;
    if (lhUnit === 'em') {
      val = Math.min(3.0, Math.max(0.8, val));
    } else {
      val = Math.min(400, Math.max(16, val));
    }
    lhSlider.value = val;
    if (isGenerated) render(false);
  });

  // Line-height unit toggle (em ↔ px)
  lhUnitBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      const newUnit = btn.getAttribute('data-unit');
      if (newUnit === lhUnit) return;

      const fontSize = parseInt(sizeNumber.value) || 72;
      const oldVal = parseFloat(lhNumber.value);

      // Convert value between units
      let newVal;
      if (newUnit === 'px') {
        // em → px
        newVal = Math.round(oldVal * fontSize);
      } else {
        // px → em
        newVal = Math.round((oldVal / fontSize) * 100) / 100;
      }

      lhUnit = newUnit;

      // Update toggle appearance
      lhUnitBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');

      // Update slider range and step
      if (lhUnit === 'px') {
        lhSlider.min = 16;
        lhSlider.max = 400;
        lhSlider.step = 1;
        lhNumber.min = 16;
        lhNumber.max = 400;
        lhNumber.step = 1;
      } else {
        lhSlider.min = 0.8;
        lhSlider.max = 3.0;
        lhSlider.step = 0.01;
        lhNumber.min = 0.8;
        lhNumber.max = 3.0;
        lhNumber.step = 0.01;
      }

      // Set the converted value
      lhSlider.value = newVal;
      lhNumber.value = newVal;

      if (isGenerated) render(false);
    });
  });

  // Background toggle
  bgWhiteBtn.addEventListener('click', function() {
    currentBg = 'white';
    bgWhiteBtn.classList.add('active');
    bgBlackBtn.classList.remove('active');
    previewWrapper.classList.add('bg-white');
    previewWrapper.classList.remove('bg-black');
    if (isGenerated) render(false);
  });
  bgBlackBtn.addEventListener('click', function() {
    currentBg = 'black';
    bgBlackBtn.classList.add('active');
    bgWhiteBtn.classList.remove('active');
    previewWrapper.classList.remove('bg-white');
    previewWrapper.classList.add('bg-black');
    if (isGenerated) render(false);
  });

  // Generate
  btnGenerate.addEventListener('click', function() {
    render(true);
  });

  // Reset
  btnReset.addEventListener('click', function() {
    titleInput.value = '';
    highlightInput.value = '';
    sizeSlider.value = 72;
    sizeNumber.value = 72;
    lhUnit = 'em';
    lhSlider.min = 0.8;
    lhSlider.max = 3.0;
    lhSlider.step = 0.01;
    lhSlider.value = 1.15;
    lhNumber.min = 0.8;
    lhNumber.max = 3.0;
    lhNumber.step = 0.01;
    lhNumber.value = 1.15;
    lhUnitBtns.forEach(function(b) { b.classList.remove('active'); });
    lhUnitToggle.querySelector('[data-unit="em"]').classList.add('active');
    currentBg = 'white';
    bgWhiteBtn.classList.add('active');
    bgBlackBtn.classList.remove('active');
    previewWrapper.classList.add('bg-white');
    previewWrapper.classList.remove('bg-black');
    previewContainer.innerHTML = '';
    previewPlaceholder.style.display = '';
    previewContainer.appendChild(previewPlaceholder);
    isGenerated = false;
  });

  // Export dropdown
  btnExport.addEventListener('click', function(e) {
    e.stopPropagation();
    exportDropdown.classList.toggle('open');
  });
  document.addEventListener('click', function() {
    exportDropdown.classList.remove('open');
  });
  exportDropdown.addEventListener('click', function(e) {
    e.stopPropagation();
  });

  // Export format buttons
  exportDropdown.querySelectorAll('button[data-format]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const format = btn.getAttribute('data-format');
      exportDropdown.classList.remove('open');

      switch (format) {
        case 'png': exportPNG(); break;
        case 'svg': exportSVG(); break;
        case 'pdf': exportPDF(); break;
        case 'eps': exportEPS(); break;
        case 'code': exportCode(); break;
      }
    });
  });

  // ─── Init ───
  async function init() {
    const safetyTimeout = setTimeout(function() {
      loadingOverlay.classList.add('hidden');
      console.warn('Font loading timed out, proceeding with available fonts');
    }, 5000);

    try {
      await document.fonts.load('700 20px Poppins');
    } catch (e) {
      // Font might load via CSS, continue anyway
    }

    // Wait a bit for font to be fully ready
    await document.fonts.ready;
    clearTimeout(safetyTimeout);

    // Measure cap height ratio
    getCapHeightRatio();
    console.log('Poppins Bold cap height ratio:', capHeightRatio);

    // Hide loading overlay
    loadingOverlay.classList.add('hidden');
  }

  init();

})();
</script>
